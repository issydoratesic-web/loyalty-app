<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>ADORA Admin Skener</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .card { background: white; color: #333; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        #reader { width: 100%; border-radius: 10px; }
        .btn { background: #d4af37; color: white; border: none; padding: 15px; border-radius: 25px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h2>ADORA Admin Panel</h2>
        <p>Skeniraj QR kod klijenta za dodavanje boda:</p>
        <button class="btn" id="start-scan">POKRENI SKENER</button>
        <div id="reader"></div>
        <div id="result" style="margin-top:20px; font-weight:bold;"></div>
    </div>

    <script>
        // Simulacija baze podataka klijenata u pregledniku
        let klijenti = JSON.parse(localStorage.getItem('adora_db')) || {};

        function onScanSuccess(decodedText) {
            // decodedText je npr "ADORA-KLIJENT-IVANA"
            let klijentID = decodedText;
            
            if (!klijenti[klijentID]) {
                klijenti[klijentID] = { ime: klijentID, bodovi: 0 };
            }

            klijenti[klijentID].bodovi++;
            localStorage.setItem('adora_db', JSON.stringify(klijenti));
            
            document.getElementById('result').innerText = 
                `Dodano! Klijent: ${klijenti[klijentID].ime} | Ukupno: ${klijenti[klijentID].bodovi} bodova.`;
            
            html5QrcodeScanner.clear();
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        document.getElementById('start-scan').onclick = () => {
            html5QrcodeScanner.render(onScanSuccess);
        };
    </script>
</body>
</html>

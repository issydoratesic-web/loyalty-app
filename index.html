<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADORA BEAUTY CONCEPT - Loyalty</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --primary-color: #d4af37; /* Zlatna */
            --accent-color: #fdecef; /* Svijetlo roza pozadina kartice */
            --dark-bg: #1a1a1a; /* Tamna pozadina aplikacije za luksuzan izgled */
            --text-color: #333333;
            --white: #ffffff;
        }

        body {
            font-family: 'Playfair Display', 'Segoe UI', serif;
            background-color: var(--dark-bg);
            color: var(--white);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .loyalty-card {
            background: var(--white);
            color: var(--text-color);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            padding: 25px;
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-sizing: border-box;
            border: 2px solid var(--primary-color);
        }

        .logo-area {
            margin-bottom: 15px;
        }

        h1 {
            font-size: 22px;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #1a1a1a;
        }

        p.brand-sub {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--primary-color);
            margin: 5px 0 20px 0;
            font-weight: bold;
        }

        p.subtitle {
            font-size: 13px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .stamps-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .stamp {
            aspect-ratio: 1;
            border: 2px dashed #ddd;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            color: #999;
            transition: all 0.3s ease;
            font-weight: bold;
            background: #fff;
            position: relative;
        }

        .stamp.special {
            border-color: var(--primary-color);
            background-color: #fffdf5;
            color: var(--primary-color);
            font-size: 11px;
        }

        .stamp.active {
            border-style: solid;
            border-color: var(--primary-color);
            background-color: var(--accent-color);
            color: var(--primary-color);
            transform: scale(1.05);
            font-size: 20px;
        }

        .btn {
            background-color: #1a1a1a;
            color: var(--white);
            border: 1px solid var(--primary-color);
            padding: 14px 20px;
            font-size: 14px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: var(--primary-color);
            color: #1a1a1a;
        }

        .btn-claim {
            background-color: #27ae60;
            border-color: #27ae60;
        }

        .btn-claim:hover {
            background-color: #219150;
            color: white;
        }

        /* Sekcija za skener */
        #scanner-section {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
